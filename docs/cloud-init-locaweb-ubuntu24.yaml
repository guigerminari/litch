#cloud-config
package_update: true
package_upgrade: true
timezone: America/Sao_Paulo
ssh_pwauth: true
packages:
  - ca-certificates
  - curl
  - git
  - build-essential
  - nginx
  - mysql-server
  - ufw
  - fail2ban
runcmd:
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs
  - systemctl enable --now nginx mysql fail2ban
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - mkdir -p /opt/litch /opt/litch/data
  - node --version > /root/litch-env.txt
  - npm --version >> /root/litch-env.txt
  - mysql --version >> /root/litch-env.txt
