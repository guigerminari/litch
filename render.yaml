services:
  - type: web
    name: litch-rpg-webapp
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LITCH_PERSISTENCE
        value: mysql
      - key: MYSQL_HOST
        value: litch-gags-e6e0.k.aivencloud.com
      - key: MYSQL_PORT
        value: "14514"
      - key: MYSQL_USER
        value: avnadmin
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: defaultdb
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
